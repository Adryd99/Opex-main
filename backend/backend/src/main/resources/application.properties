server.port=8080

spring.application.name=backend
  
  # --- CONFIGURAZIONE DATABASE ---
spring.datasource.url=${APP_PG_JDBC_URL:jdbc:postgresql://${APP_PG_HOST:localhost}:${APP_PG_PORT:5433}/${APP_PG_DB:opexdb}}
spring.datasource.username=${APP_PG_USER:opex}
spring.datasource.password=${APP_PG_PASSWORD:opex}
spring.datasource.driver-class-name=org.postgresql.Driver
  
  # --- CONFIGURAZIONE JPA/HIBERNATE ---
  # Crea/aggiorna le tabelle in automatico (ottimo per lo sviluppo, in prod si usa 'validate')
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
  # Mostra le query in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
  
  # --- CONFIGURAZIONE SICUREZZA (RESOURCE SERVER) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/opex}
  
  # --- CONFIGURAZIONE KEYCLOAK ADMIN CLIENT ---
keycloak-admin.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8081}
keycloak-admin.realm=${KEYCLOAK_ADMIN_REALM:master}
keycloak-admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak-admin.username=${KC_ADMIN:admin}
keycloak-admin.password=${KC_ADMIN_PW:admin}
keycloak-admin.target-realm=${KEYCLOAK_TARGET_REALM:opex}
  
  # --- CONFIGURAZIONE MICROSERVIZI ESTERNI ---
external-services.saltedge-microservice.url=${SALTEDGE_PROXY_URL:http://localhost:8082}

# --- CONFIGURAZIONE AWS S3 ---
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:opex-files}
aws.s3.region=${AWS_REGION:eu-central-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:test}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:test}

# --- CONFIGURAZIONE LEGALE / GDPR ---
legal.controller.name=${LEGAL_CONTROLLER_NAME:Opex}
legal.controller.address=${LEGAL_CONTROLLER_ADDRESS:Configure before production go-live}
legal.controller.privacy-email=${LEGAL_PRIVACY_EMAIL:privacy@opex.local}
legal.controller.dpo-email=${LEGAL_DPO_EMAIL:dpo@opex.local}
legal.controller.support-email=${LEGAL_SUPPORT_EMAIL:support@opex.local}
legal.controller.supervisory-authority=${LEGAL_SUPERVISORY_AUTHORITY:Configure your lead supervisory authority before go-live}

legal.policy.last-updated=${LEGAL_POLICY_LAST_UPDATED:2026-04-09}
legal.policy.privacy-version=${LEGAL_PRIVACY_VERSION:2026-04-09}
legal.policy.terms-version=${LEGAL_TERMS_VERSION:2026-04-09}
legal.policy.cookie-version=${LEGAL_COOKIE_VERSION:2026-04-09}
legal.policy.open-banking-version=${LEGAL_OPEN_BANKING_VERSION:2026-04-09}

legal.retention.active-account=${LEGAL_RETENTION_ACTIVE_ACCOUNT:Retained while the account stays active and for up to 30 days after closure unless a longer statutory period applies.}
legal.retention.closed-account=${LEGAL_RETENTION_CLOSED_ACCOUNT:Core billing, invoice or tax records may be retained for the period required by applicable accounting and tax laws.}
legal.retention.open-banking-data=${LEGAL_RETENTION_OPEN_BANKING:Retained while the related connection stays active and then removed or anonymized according to closure and statutory retention rules.}
legal.retention.consent-audit=${LEGAL_RETENTION_CONSENT_AUDIT:Retained for the lifetime of the account and for up to 6 years after closure to evidence policy acceptance history where needed.}

legal.processors[0].name=Keycloak
legal.processors[0].purpose=Authentication, identity and session management
legal.processors[0].data-categories=Email address, names, account identifiers and authentication metadata
legal.processors[0].region=Configured by your identity deployment

legal.processors[1].name=Salt Edge
legal.processors[1].purpose=Open-banking connectivity and bank authorization redirection
legal.processors[1].data-categories=Customer identifiers, bank connection metadata, balances and transactions for connected accounts
legal.processors[1].region=Configured by your Salt Edge setup

legal.processors[2].name=AWS S3
legal.processors[2].purpose=File and document object storage
legal.processors[2].data-categories=Uploaded files and generated exports stored by the application
legal.processors[2].region=${AWS_REGION:eu-central-1}

legal.storage-technologies[0].name=Access token
legal.storage-technologies[0].key=opex_access_token
legal.storage-technologies[0].purpose=Maintains the authenticated browser session
legal.storage-technologies[0].duration=Until logout or token expiry
legal.storage-technologies[0].essential=true

legal.storage-technologies[1].name=Refresh token
legal.storage-technologies[1].key=opex_refresh_token
legal.storage-technologies[1].purpose=Renews the authenticated session without forcing a new login
legal.storage-technologies[1].duration=Until logout or refresh expiry
legal.storage-technologies[1].essential=true

legal.storage-technologies[2].name=Token expiry marker
legal.storage-technologies[2].key=opex_token_expires_at
legal.storage-technologies[2].purpose=Tracks when the current token must be refreshed
legal.storage-technologies[2].duration=Until logout or token expiry
legal.storage-technologies[2].essential=true

legal.storage-technologies[3].name=PKCE verifier
legal.storage-technologies[3].key=opex_pkce_verifier
legal.storage-technologies[3].purpose=Secures the OAuth PKCE login flow
legal.storage-technologies[3].duration=Session storage, removed after login
legal.storage-technologies[3].essential=true

legal.storage-technologies[4].name=OAuth state
legal.storage-technologies[4].key=opex_oauth_state
legal.storage-technologies[4].purpose=Protects the login flow against CSRF and state mismatch
legal.storage-technologies[4].duration=Session storage, removed after login
legal.storage-technologies[4].essential=true

legal.storage-technologies[5].name=Selected provider
legal.storage-technologies[5].key=opex_selected_provider_name
legal.storage-technologies[5].purpose=Remembers the selected bank provider filter in the UI
legal.storage-technologies[5].duration=Until changed or local storage is cleared
legal.storage-technologies[5].essential=true

legal.storage-technologies[6].name=Provider cache
legal.storage-technologies[6].key=opex_bank_providers
legal.storage-technologies[6].purpose=Caches the available provider list for the current session
legal.storage-technologies[6].duration=Until refreshed or local storage is cleared
legal.storage-technologies[6].essential=true

legal.storage-technologies[7].name=Bank sync completion marker
legal.storage-technologies[7].key=opex_bank_sync_completed_at
legal.storage-technologies[7].purpose=Signals that a browser tab should refresh after a completed bank sync
legal.storage-technologies[7].duration=Until overwritten or local storage is cleared
legal.storage-technologies[7].essential=true
