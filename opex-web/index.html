
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Opex - Financial Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              opex: {
                dark: '#112633', // Dark Navy for buttons
                teal: '#1F4650', // Logo color
                green: '#E5F8ED', // Light green bg
                greenText: '#22C55E',
                red: '#FEF2F2',
                redText: '#EF4444',
                gray: '#F8F9FB', // App background
              }
            },
            boxShadow: {
              'up': '0 -4px 6px -1px rgba(0, 0, 0, 0.1)',
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
      }
      body {
        background-color: #F8F9FB;
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      /* Dark mode styles */
      .dark body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
      .dark {
        color-scheme: dark;
      }
      /* Hide scrollbar for clean mobile look */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(17, 183, 165, 0.12), transparent 38%),
          linear-gradient(180deg, #fbfcfd 0%, #f4f7f8 100%);
        transition: opacity 220ms ease, visibility 220ms ease;
      }
      #boot-splash.boot-splash-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-splash__ambient {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .boot-splash__orb {
        position: absolute;
        border-radius: 9999px;
        filter: blur(56px);
      }
      .boot-splash__orb--top {
        left: 50%;
        top: 16%;
        width: 16rem;
        height: 16rem;
        transform: translateX(-50%);
        background: rgba(31, 70, 80, 0.10);
      }
      .boot-splash__orb--right {
        right: 14%;
        bottom: 12%;
        width: 14rem;
        height: 14rem;
        background: rgba(17, 38, 51, 0.06);
      }
      .boot-splash__orb--left {
        left: 10%;
        top: 55%;
        width: 10rem;
        height: 10rem;
        background: rgba(167, 243, 208, 0.28);
      }
      .boot-splash__content {
        position: relative;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 4rem 1.5rem;
      }
      .boot-splash__stack {
        width: 100%;
        max-width: 42rem;
        text-align: center;
      }
      .boot-splash__panel {
        margin: 0 auto;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }
      .boot-splash__logo-wrap {
        border: 1px solid rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.8);
        border-radius: 2.5rem;
        padding: 2rem 2.5rem;
        box-shadow: 0 24px 80px rgba(11, 36, 53, 0.08);
        backdrop-filter: blur(10px);
      }
      .boot-splash__logo {
        display: block;
        height: 6rem;
        width: auto;
        object-fit: contain;
      }
      .boot-splash__eyebrow {
        margin: 0 0 0.75rem;
        color: #9ca3af;
        font-size: 0.6875rem;
        font-weight: 900;
        letter-spacing: 0.38em;
        text-transform: uppercase;
      }
      .boot-splash__title {
        margin: 0;
        color: #112633;
        font-size: clamp(2rem, 4vw, 2.75rem);
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .boot-splash__description {
        margin: 0.75rem auto 0;
        max-width: 32rem;
        color: #6b7280;
        font-size: 1rem;
        line-height: 1.65;
      }
      .boot-splash__loader {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.75);
        border-radius: 9999px;
        padding: 0.875rem 1.25rem;
        box-shadow: 0 10px 30px rgba(17, 38, 51, 0.06);
        backdrop-filter: blur(10px);
      }
      .boot-splash__dot {
        width: 0.625rem;
        height: 0.625rem;
        border-radius: 9999px;
        background: rgba(31, 70, 80, 0.82);
        animation: boot-splash-bounce 1.1s infinite ease-in-out both;
      }
      .boot-splash__dot:nth-child(2) {
        animation-delay: 120ms;
      }
      .boot-splash__dot:nth-child(3) {
        animation-delay: 240ms;
      }
      @keyframes boot-splash-bounce {
        0%, 80%, 100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
      @media (max-width: 640px) {
        .boot-splash__logo-wrap {
          padding: 1.75rem 2rem;
        }
        .boot-splash__logo {
          height: 5.25rem;
        }
        .boot-splash__description {
          font-size: 0.9375rem;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
</head>
  <body>
    <div id="boot-splash" aria-hidden="false">
      <div class="boot-splash__ambient">
        <div class="boot-splash__orb boot-splash__orb--top"></div>
        <div class="boot-splash__orb boot-splash__orb--right"></div>
        <div class="boot-splash__orb boot-splash__orb--left"></div>
      </div>
      <div class="boot-splash__content">
        <div class="boot-splash__stack">
          <div class="boot-splash__panel">
            <div class="boot-splash__logo-wrap">
              <img class="boot-splash__logo" src="/opes-large.png" alt="Opex" />
            </div>
            <div>
              <p class="boot-splash__eyebrow">Opex Workspace</p>
              <h1 class="boot-splash__title">Preparing your workspace</h1>
              <p class="boot-splash__description">
                We are syncing your profile, security status and latest banking data before the app opens.
              </p>
            </div>
            <div class="boot-splash__loader" aria-label="Loading">
              <span class="boot-splash__dot"></span>
              <span class="boot-splash__dot"></span>
              <span class="boot-splash__dot"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
